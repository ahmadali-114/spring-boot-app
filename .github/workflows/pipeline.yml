name: Spring Boot CI/CD to AWS ECR + EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ECR_REPO: project/spring-boot-app
  CONTAINER_NAME: app
  HOST_PORT: 8080
  CONTAINER_PORT: 8080

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run tests
        run: |
          docker run --rm -v "$PWD":/app -w /app maven:3.9.8-eclipse-temurin-17 mvn test

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPO:latest .

      - name: Tag Docker image
        run: |
          docker tag $ECR_REPO:latest ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:latest

      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY_EC2 }}
          script: |
            set -e

            IMAGE="831666161064.dkr.ecr.eu-west-1.amazonaws.com/${{ env.ECR_REPO }}:latest"

            docker pull "$IMAGE"

            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
              "$IMAGE"

            docker ps --filter "name=${{ env.CONTAINER_NAME }}"
